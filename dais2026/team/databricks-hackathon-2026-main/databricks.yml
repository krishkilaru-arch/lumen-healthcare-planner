bundle:
  name: lumen-virtue

# The build outputs (dist/, client/dist/) are git-ignored, and bundle sync
# honors .gitignore. Force-include them so the artifacts built in CI are
# uploaded with the source — the app runs these, the platform does not rebuild.
sync:
  include:
    - dist/**
    - client/dist/**

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  genie_space_id:
    description: Default Genie Space ID
  genie_space_name:
    description: Genie Space display name
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches {project-name}`, select the desired item from the output array and use its .name value. Requires the project resource name.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  postgres_project:
    description: Full Lakebase Postgres project resource name. Obtain by running `databricks postgres list-projects`, select the desired item from the output array and use its .name value.
  serving_endpoint_name:
    description: Serving endpoint name

resources:
  apps:
    app:
      name: 'lumen-virtue'
      description: 'DAIS 2026 Lumen Virtue: healthcare facility intelligence on the Virtue Foundation synced dataset, with Genie Q&A, AI chat, and Lakebase outreach worklist'
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie
        - serving.serving-endpoints

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    workspace:
      host: https://dbc-5bcc65d8-a106.cloud.databricks.com

    variables:
      sql_warehouse_id: 2c29e29ae051b1ef
      genie_space_id: 01f168e5342a13b7926b91f02c923504
      genie_space_name: Virtue Foundation Facilities
      postgres_branch: projects/lumen-virtue-app/branches/production
      postgres_database: projects/lumen-virtue-app/branches/production/databases/databricks-postgres
      postgres_project: projects/lumen-virtue-app
      serving_endpoint_name: databricks-claude-opus-4-8
